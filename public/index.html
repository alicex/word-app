<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語メモ</title>
    <link rel="stylesheet" href="/css/output.css">
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-2xl px-5 py-10">
      <header class="mb-8">
        <p class="mb-2 text-sm font-semibold text-slate-500">Word Stock</p>
        <h1 class="text-3xl font-bold tracking-tight text-slate-900">単語メモ</h1>
        <p class="mt-3 text-sm leading-6 text-slate-600">
          調べた単語をAIで短く整理して、Notionへ保存します。
        </p>
      </header>

      <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="space-y-5">
          <div>
            <label for="word" class="mb-2 block text-sm font-bold text-slate-700">
              単語名
            </label>
            <input
              id="word"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-base outline-none transition focus:border-slate-900 focus:ring-4 focus:ring-slate-100"
              placeholder="例：Hydration"
            >
          </div>

          <div>
            <label for="memo" class="mb-2 block text-sm font-bold text-slate-700">
              補足メモ
            </label>
            <textarea
              id="memo"
              class="min-h-20 w-full resize-y rounded-xl border border-slate-300 bg-white px-4 py-3 text-base leading-7 outline-none transition focus:border-slate-900 focus:ring-4 focus:ring-slate-100"
              placeholder="自分なりのメモや、気になったことを書いてください"
              rows="3"
            ></textarea>
          </div>

          <button
            id="submit"
            class="inline-flex items-center justify-center rounded-xl bg-slate-900 px-5 py-3 text-sm font-bold text-white transition hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-50"
          >
            Notionへ追加
          </button>
        </div>
      </section>

      <section class="mt-6">
        <p id="status" class="text-sm font-bold text-slate-600"></p>
        <pre
          id="result"
          class="mt-3 whitespace-pre-wrap rounded-2xl border border-slate-200 bg-white p-5 text-sm leading-7 text-slate-700 shadow-sm"
        ></pre>
      </section>
    </main>

    <script>
      document.getElementById('submit').addEventListener('click', async () => {
        const word = document.getElementById('word').value
        const memo = document.getElementById('memo').value
        const status = document.getElementById('status')
        const result = document.getElementById('result')
        const submit = document.getElementById('submit')

        status.textContent = '登録中...'
        result.textContent = ''
        submit.disabled = true

        const response = await fetch('/api/words', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ word, memo })
        })

        const data = await response.json()

        submit.disabled = false

        if (!response.ok) {
          status.textContent = data.message || '失敗しました'
          return
        }

        status.textContent = 'Notionへ追加しました'
        result.textContent = data.summary
      })
    </script>
  </body>
</html>
