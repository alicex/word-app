<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>単語メモ</title>
  </head>
  <body>
    <h1>単語メモ</h1>

    <input id="word" placeholder="単語名">
    <br>
    <br>

    <textarea id="memo" placeholder="補足メモ" rows="5"></textarea>
    <br><br>

    <button id="submit">Notionへ追加</button>

    <p id="status"></p>
    <pre id="result"></pre>

    <script>
      document.getElementById('submit').addEventListener('click', async () => {
        const word = document.getElementById('word').value
        const memo = document.getElementById('memo').value
        const status = document.getElementById('status')
        const result = document.getElementById('result')

        status.textContent = '登録中...'
        result.textContent = ''

        const response = await fetch('/api/words', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ word, memo })
        })

        const data = await response.json()

        if (!response.ok) {
          status.textContent = data.message || '失敗しました'
          return
        }

        status.textContent = 'Notionへ追加しました'
        result.textContent = data.summary
      })
    </script>
  </body>
</html>
